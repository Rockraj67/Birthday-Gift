<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Happy Birthday Khwahish </title>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
font-family:Arial,sans-serif;
}

.page{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.active{
display:flex;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.1);
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:1;
}

100%{
transform:translateY(-100vh);
opacity:0;
}

}

.heart{

position:fixed;

font-size:28px;

animation:float 6s linear infinite;

}

img{

width:220px;

border-radius:20px;

margin:10px;

box-shadow:0 0 20px rgba(255,255,255,.8);

}

</style>
</head>
<body>
     <!-- Floating Hearts -->
      <audio id="bgMusic" loop>
    <source src="amito.mp3" type="audio/mpeg">
</audio>
<div id="hearts"></div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
    <h1 style="font-size:55px;color:white;">🎂 Happy Birthday 🎂</h1>

    <h2 style="font-size:42px;color:#fff;">
        Khwahish ❤️
    </h2>

    <p style="font-size:22px;color:white;margin-top:20px;">
        Today is your special day ✨<br>
        A little surprise is waiting for you...
    </p>

    <div style="font-size:80px;animation:float 2s infinite;">
        🎁
    </div>

    <button onclick="nextPage1()">
        Open Gift ❤️
    </button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

    <h1 style="font-size:45px;color:white;">
        🎉 Happy Birthday Khwahish 🎉
    </h1>

    <p style="font-size:22px;color:white;max-width:500px;margin-top:20px;">
        May your life always be filled with happiness,
        smiles, success and lots of love. ❤️✨
    </p>

    <div style="font-size:75px;">
        🎈🎂🎉🎁❤️
    </div>

    <button onclick="nextPage2()">
        See Memories 📸
    </button>

</div>

<!-- PAGE 3 -->
<div id="page3" class="page">

    <h1 style="color:white;font-size:42px;">
        📸 Beautiful Memories
    </h1>

    <!-- Replace image names with your own -->
    <img src="pic1st.jpeg">

    <img src="pic2nd.jpeg">

    <img src="pic3rd.jpeg">

    <button onclick="celebrate()">
        Final Surprise 🎊
    </button>

</div>
<script>
function nextPage1(){
    document.getElementById("bgMusic").play();
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");

    confetti({
        particleCount:150,
        spread:80,
        origin:{y:0.6}
    });
}

function nextPage2(){
    document.getElementById("page2").classList.remove("active");
    document.getElementById("page3").classList.add("active");

    confetti({
        particleCount:200,
        spread:120
    });
}

function celebrate(){
    confetti({
        particleCount:400,
        spread:180
    });

    setTimeout(()=>{
        confetti({
            particleCount:250,
            spread:180,
            origin:{x:0}
        });

        confetti({
            particleCount:250,
            spread:180,
            origin:{x:1}
        });
    },400);

    alert("❤️ Happy Birthday Khwahish ❤️");
}

for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.innerHTML="❤️";
    heart.className="heart";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*4)+"s";
    document.getElementById("hearts").appendChild(heart);
}
</script>
</body>
</html>
